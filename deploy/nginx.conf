# WeFetePass — Nginx reverse proxy template
# ----------------------------------------------------------------------------
# Replace `wefetepass.example.com` with your real domain (3 places below).
# Replace the certificate paths with your real cert paths (Let's Encrypt
# default shown). After installing, test with: nginx -t && systemctl reload nginx
# ----------------------------------------------------------------------------

# -- HTTP -> HTTPS redirect --------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name wefetepass.example.com;     # <-- change me

    # ACME http-01 challenge for certbot renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -- HTTPS app server --------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name wefetepass.example.com;     # <-- change me

    # --- TLS ---------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/wefetepass.example.com/fullchain.pem;   # <-- change me
    ssl_certificate_key /etc/letsencrypt/live/wefetepass.example.com/privkey.pem;     # <-- change me
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Security headers --------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Body size: bank receipt uploads can be chunky ---------------------
    client_max_body_size 10M;

    # --- Gzip --------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Door scanner SSE / long-poll endpoints ----------------------------
    # The /door/* and /api/door/* routes may stream Server-Sent Events.
    # Disable buffering and bump read timeout so the connection stays open.
    location ~* ^/(api/)?door/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --- Next.js static assets (immutable, cache hard) ---------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Everything else ---------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
